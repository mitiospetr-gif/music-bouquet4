<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ваш персональный подарок</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body class="gift-page dark-theme">

<div class="gift-container">

    <div class="gift-card">

        <div class="bouquet-wrapper">
            <img id="bouquetImage" class="bouquet-image" src="" alt="bouquet">
        </div>

        <div class="gift-content">

            <h2 class="greeting-title">Для тебя 💛</h2>

            <p id="greetingText" class="greeting-text"></p>

            <h3 id="trackName" class="track-name"></h3>

            <div class="links-section">

                <a id="youtubeBtn" class="btn-platform youtube" target="_blank">
                    ▶ YouTube
                </a>

                <a id="yandexBtn" class="btn-platform yandex" target="_blank">
                    💿 Яндекс Музыка
                </a>

            </div>

            <p id="authorText" class="author-text"></p>

        </div>

    </div>

</div>

<!-- ❌ ВАЖНО: никакой кнопки "создать" больше нет -->

<script src="app.js"></script>

</body>
</html>
