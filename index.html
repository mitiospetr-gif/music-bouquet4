<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Bouquet - Создание подарка</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body class="dark-theme">

<div class="container">

    <header class="header">
        <h1>🌸 Music Bouquet</h1>
        <p>Создай музыкальный подарок за минуту</p>
    </header>

    <!-- ФОРМА -->
    <div class="form">

        <input id="title" placeholder="Название трека">
        <input id="author" placeholder="Автор / исполнитель">
        <textarea id="text" placeholder="Тёплое сообщение"></textarea>

        <input id="youtube" placeholder="YouTube ссылка">
        <input id="yandex" placeholder="Яндекс Музыка ссылка">
        <input id="image" placeholder="URL картинки букета">

        <button id="createBtn">✨ Создать подарок</button>

        <button id="copyBtn" style="margin-top:10px;">
            📋 Скопировать ссылку
        </button>

        <p id="result" style="word-break: break-all; margin-top:10px;"></p>

    </div>

</div>

<script src="app.js"></script>

<script>
document.getElementById("createBtn").onclick = () => {

    const data = {
        title: document.getElementById("title").value,
        author: document.getElementById("author").value,
        text: document.getElementById("text").value,
        youtube: document.getElementById("youtube").value,
        yandex: document.getElementById("yandex").value,
        image: document.getElementById("image").value
    };

    const link = createShareLink(data);

    document.getElementById("result").textContent = link;

    window.generatedLink = link;
};

document.getElementById("copyBtn").onclick = () => {
    navigator.clipboard.writeText(window.generatedLink || "");
    alert("Ссылка скопирована");
};
</script>

</body>
</html>
